on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          - {os: macos-latest,  r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Install system libraries (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y libhdf5-dev

      - name: Install system libraries (macOS)
        if: runner.os == 'macOS'
        run: brew install hdf5 || true

      - name: Install BiocManager
        run: install.packages("BiocManager")
        shell: Rscript {0}

      - name: Install Bioconductor dependencies
        run: |
          BiocManager::install(c("MOFA2", "DESeq2", "SummarizedExperiment",
                                  "BiocParallel", "fgsea", "BiocStyle"),
                                ask = FALSE, update = FALSE)
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
          dependencies: '"hard"'

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          args: 'c("--no-manual", "--no-tests")'
        env:
          _R_CHECK_FORCE_SUGGESTS_: false
