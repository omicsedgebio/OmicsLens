<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6496;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#aed6f1;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#5dade2;stop-opacity:0.7"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- Lens outer ring -->
  <circle cx="44" cy="44" r="26" fill="none" stroke="white" stroke-width="5" opacity="0.95"/>
  <!-- Lens inner fill -->
  <circle cx="44" cy="44" r="21" fill="url(#lens)" opacity="0.5"/>
  <!-- Lens shine -->
  <circle cx="37" cy="37" r="6" fill="white" opacity="0.25"/>
  <!-- Handle -->
  <line x1="63" y1="63" x2="80" y2="80" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- DNA helix dots suggesting omics -->
  <circle cx="72" cy="22" r="3" fill="white" opacity="0.7"/>
  <circle cx="78" cy="30" r="2" fill="white" opacity="0.5"/>
  <circle cx="68" cy="30" r="2" fill="white" opacity="0.5"/>
  <circle cx="76" cy="38" r="3" fill="white" opacity="0.7"/>
</svg>
